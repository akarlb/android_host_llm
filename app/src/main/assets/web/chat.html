<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chat - Phone Hosted AI</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body data-page="chat">
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1>Phone Hosted AI</h1>
        <p id="current-user" class="muted"></p>
      </div>
      <nav>
        <a id="admin-link" href="/admin" hidden>Admin</a>
        <button id="logout-button" type="button">Logout</button>
      </nav>
    </header>
    <aside class="sidebar">
      <button id="new-chat-button" type="button">New chat</button>
      <label class="sr-only" for="chat-search">Search chats</label>
      <input id="chat-search" type="search" placeholder="Search chats">
      <div id="chat-list" class="chat-list"></div>
    </aside>
    <main class="chat-main">
      <section id="model-status-banner" class="status-banner" aria-live="polite">Checking local model...</section>
      <section class="chat-controls" aria-label="Chat controls">
        <span id="current-skill-label" class="skill-label">Skill: Default</span>
        <label class="thinking-toggle">
          <input id="show-thinking-toggle" type="checkbox">
          Show thinking
        </label>
        <span id="skill-status" class="context-status" aria-live="polite"></span>
      </section>
      <div id="tool-status" class="tool-status" aria-live="polite"></div>
      <section id="chat-generation-status" class="generation-recovery" aria-live="polite" hidden></section>
      <div id="messages" class="messages"></div>
      <form id="message-form" class="composer">
        <div id="selected-files" class="selected-files"></div>
        <p id="context-status" class="context-status" aria-live="polite"></p>
        <p id="upload-status" class="context-status" aria-live="polite"></p>
        <p class="shortcut-hint">Enter sends. Shift+Enter adds a new line.</p>
        <div class="composer-row">
          <label class="attach-button" title="Attach Markdown file">
            <span aria-hidden="true">+</span>
            <span class="sr-only">Attach Markdown file</span>
            <input id="file-upload" type="file" accept=".md,text/markdown,text/plain">
          </label>
          <div class="composer-input-wrap">
            <textarea id="message-input" rows="3" placeholder="Ask the local model..." required></textarea>
            <div id="slash-menu" class="slash-menu" role="listbox" hidden></div>
          </div>
          <div class="send-actions">
            <button id="send-button" type="submit">Send</button>
            <button id="stop-button" type="button" hidden>Stop</button>
            <button id="retry-button" type="button">Retry</button>
          </div>
        </div>
        <p id="files-error" class="error" role="alert"></p>
        <p id="chat-error" class="error" role="alert"></p>
      </form>
    </main>
  </div>
  <script src="/app.js"></script>
</body>
</html>
